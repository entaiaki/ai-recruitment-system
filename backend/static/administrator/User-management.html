<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AlgoTalent - User Management</title>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
  <style> body { min-height: 100vh; overflow-y: auto; } </style>
</head>
<body class="bg-gray-50">
  <header class="bg-white border-b border-gray-200">
    <div class="max-w-full mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex justify-between items-center h-16">
        <div class="flex items-center">
          <img src="../image/logo.png" alt="Logo" class="w-10 h-10 object-cover rounded-full">
          <span class="text-xl font-bold text-blue-600 ml-2">AlgoTalent</span>
        </div>
        <div class="flex items-center space-x-6">
          <span id="currentAdminInfo" class="text-sm text-gray-500 hidden"></span>
          <button id="logoutBtn" class="bg-red-600 hover:bg-red-700 text-white px-4 py-2 rounded-md text-sm font-medium transition-colors">Logout</button>
        </div>
      </div>
    </div>
  </header>

  <nav class="bg-white border-b border-gray-200">
    <div class="max-w-full mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex flex-wrap space-x-6 pt-4 pb-2">
        <a href="../job-management.html" class="text-gray-500 hover:text-gray-900 px-1 py-2 text-sm font-medium"><i class="fa fa-briefcase mr-1"></i> Jobs</a>
        <a href="../candidates.html" class="text-gray-500 hover:text-gray-900 px-1 py-2 text-sm font-medium"><i class="fa fa-users mr-1"></i> Candidates</a>
        <a href="../applications.html" class="text-gray-500 hover:text-gray-900 px-1 py-2 text-sm font-medium"><i class="fa fa-file-text mr-1"></i> Applications</a>
        <a href="User-management.html" class="text-blue-600 border-b-2 border-blue-600 px-1 py-2 text-sm font-medium"><i class="fa fa-user-circle mr-1"></i> Users</a>
        <a href="../data-analysis.html" class="text-gray-500 hover:text-gray-900 px-1 py-2 text-sm font-medium"><i class="fa fa-bar-chart mr-1"></i> Analytics</a>
        <a href="../index.html" class="text-gray-500 hover:text-gray-900 px-1 py-2 text-sm font-medium"><i class="fa fa-list-alt mr-1"></i> Audit Logs</a>
      </div>
    </div>
  </nav>

  <main class="max-w-7xl mx-auto px-4 py-8">
    <div class="mb-8 flex justify-between items-center">
      <div><h1 class="text-2xl font-bold text-gray-800">Registered Users</h1><p class="text-gray-500">Manage all system users</p></div>
      <button id="addAdminBtn" class="bg-blue-600 text-white px-6 py-2 rounded-md hover:bg-blue-700 transition"><i class="fa fa-plus"></i> Add User</button>
    </div>

    <div class="mb-8 flex flex-wrap gap-4">
      <div class="relative flex-grow max-w-md">
        <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-gray-500"><i class="fa fa-search"></i></span>
        <input id="searchInput" type="text" placeholder="Search by name, email, role, department..." class="w-full pl-10 pr-4 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">
      </div>
      <select id="roleFilter" class="px-4 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 bg-white">
        <option value="all">All Roles</option>
        <option value="admin">Admin</option>
        <option value="hr">HR</option>
        <option value="dept_leader">Dept Leader</option>
        <option value="guest">Guest</option>
      </select>
      <button id="searchBtn" class="bg-blue-600 text-white px-6 py-2 rounded-md hover:bg-blue-700 transition"><i class="fa fa-search"></i> Search</button>
    </div>

    <div class="bg-white shadow-sm rounded-lg overflow-hidden">
      <table class="min-w-full divide-y divide-gray-200">
        <thead class="bg-gray-50">
          <tr>
            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">ID</th>
            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Name</th>
            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Email</th>
            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Role</th>
            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Department</th>
            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Status</th>
          </tr>
        </thead>
        <tbody id="userTableBody" class="divide-y divide-gray-200"></tbody>
      </table>
    </div>
    <div id="pagination" class="mt-6 flex justify-center gap-2"></div>
  </main>

  <!-- Detail Modal -->
  <div id="detailModal" class="fixed inset-0 bg-black bg-opacity-50 hidden items-center justify-center z-50">
    <div class="bg-white rounded-lg shadow-xl w-full max-w-md m-4">
      <div class="p-6 border-b flex justify-between items-center"><h3 class="text-lg font-semibold">User Details</h3><button id="closeDetailBtn" class="text-gray-500">&times;</button></div>
      <div class="p-6 space-y-2 text-sm">
        <div><span class="text-gray-500">Name:</span> <span id="detailName" class="font-medium"></span></div>
        <div><span class="text-gray-500">Email:</span> <span id="detailEmail"></span></div>
        <div><span class="text-gray-500">Role:</span> <span id="detailRole"></span></div>
        <div><span class="text-gray-500">Department:</span> <span id="detailDept"></span></div>
        <div><span class="text-gray-500">Status:</span> <span id="detailActive"></span></div>
        <div><span class="text-gray-500">Created:</span> <span id="detailCreated"></span></div>
      </div>
      <div class="p-4 border-t flex justify-between">
        <button id="deleteUserBtn" class="px-4 py-2 bg-red-600 text-white rounded-md hover:bg-red-700 text-sm">Delete User</button>
        <button id="detailCloseBottom" class="px-4 py-2 border rounded-md text-sm">Close</button>
      </div>
    </div>
  </div>

  <!-- Add User Modal -->
  <div id="formModal" class="fixed inset-0 bg-black bg-opacity-50 hidden items-center justify-center z-50">
    <div class="bg-white rounded-lg shadow-xl w-full max-w-md m-4">
      <div class="p-6 border-b flex justify-between items-center"><h3 class="text-lg font-semibold">Add New User</h3><button id="closeFormModal" class="text-gray-500">&times;</button></div>
      <form id="adminForm" class="p-6 space-y-4">
        <div><label class="block text-gray-700 mb-1">Full Name *</label><input id="formFullName" type="text" class="w-full px-4 py-2 border rounded-md" required></div>
        <div><label class="block text-gray-700 mb-1">Email *</label><input id="formEmail" type="email" class="w-full px-4 py-2 border rounded-md" required></div>
        <div><label class="block text-gray-700 mb-1">Role *</label><select id="formRole" class="w-full px-4 py-2 border rounded-md" required><option value="admin">Admin</option><option value="hr">HR</option><option value="dept_leader">Dept Leader</option><option value="guest">Guest</option></select></div>
        <div><label class="block text-gray-700 mb-1">Department</label><input id="formDepartment" type="text" class="w-full px-4 py-2 border rounded-md"></div>
        <div><label class="block text-gray-700 mb-1">Password *</label><input id="formPassword" type="password" class="w-full px-4 py-2 border rounded-md" required></div>
        <div class="flex justify-end space-x-3 pt-4 border-t">
          <button type="button" id="cancelAdminForm" class="px-6 py-2 border rounded-md">Cancel</button>
          <button type="submit" class="px-6 py-2 bg-green-600 text-white rounded-md hover:bg-green-700">Add User</button>
        </div>
      </form>
    </div>
  </div>

  <script src="../api.js"></script>
  <script src="../auth.js"></script>
  <script src="scripts/user-management.js"></script>
</body>
</html>
