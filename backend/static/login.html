<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AlgoTalent — Login</title>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
  <style>
    body {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-card {
      background: white;
      border-radius: 16px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.15);
      width: 400px;
      max-width: 90vw;
    }
    .login-header {
      background: linear-gradient(135deg, #2563eb, #1d4ed8);
      color: white;
      border-radius: 16px 16px 0 0;
      padding: 32px;
      text-align: center;
    }
    .login-body {
      padding: 32px;
    }
    .input-field {
      width: 100%;
      padding: 12px 16px;
      border: 2px solid #e5e7eb;
      border-radius: 8px;
      font-size: 15px;
      transition: border-color 0.2s;
      outline: none;
    }
    .input-field:focus {
      border-color: #2563eb;
    }
    .btn-login {
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, #2563eb, #1d4ed8);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .btn-login:hover { opacity: 0.9; }
    .btn-login:disabled { opacity: 0.6; cursor: not-allowed; }
    .error-msg {
      background: #fef2f2;
      color: #dc2626;
      padding: 10px 16px;
      border-radius: 6px;
      font-size: 14px;
      margin-bottom: 16px;
      display: none;
    }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="login-header">
      <h1 style="font-size:28px;font-weight:700;margin:0">AlgoTalent</h1>
      <p style="margin:8px 0 0;opacity:0.85;font-size:14px">AI-Powered Recruitment System</p>
    </div>
    <div class="login-body">
      <div class="error-msg" id="errorMsg"></div>
      <form id="loginForm" onsubmit="handleLogin(event)">
        <div style="margin-bottom:16px">
          <label style="display:block;font-size:14px;font-weight:500;color:#374151;margin-bottom:6px">Email</label>
          <input type="email" id="email" class="input-field" placeholder="admin@test.com" required autofocus>
        </div>
        <div style="margin-bottom:24px">
          <label style="display:block;font-size:14px;font-weight:500;color:#374151;margin-bottom:6px">Password</label>
          <input type="password" id="password" class="input-field" placeholder="Enter your password" required>
        </div>
        <button type="submit" class="btn-login" id="loginBtn">Sign In</button>
      </form>
      <div style="margin-top:20px;text-align:center;font-size:13px;color:#9ca3af">
        Default: admin@test.com / admin123
      </div>
    </div>
  </div>

  <script src="api.js"></script>
  <script>
    // If already logged in, redirect to dashboard
    if (window.API && window.API.isLoggedIn()) {
      window.location.href = '/job-management.html';
    }

    async function handleLogin(e) {
      e.preventDefault();
      var btn = document.getElementById('loginBtn');
      var errorEl = document.getElementById('errorMsg');
      btn.disabled = true;
      btn.textContent = 'Signing in...';
      errorEl.style.display = 'none';

      try {
        await window.API.login(
          document.getElementById('email').value,
          document.getElementById('password').value
        );
        window.location.href = '/job-management.html';
      } catch (err) {
        errorEl.textContent = err.message;
        errorEl.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Sign In';
      }
    }
  </script>
</body>
</html>
