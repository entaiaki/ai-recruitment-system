<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chat with HR – TalentFlow</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet" />
</head>

<body class="bg-gray-50 min-h-screen flex flex-col">
    <!-- 头部 -->
    <div id="header"></div>

    <main class="flex-1">
        <!-- 这里加一个固定高度：视口高度 - 头尾的空白，数值你可以微调 -->
        <div class="max-w-4xl mx-auto px-4 py-6 flex flex-col" style="height: calc(100vh - 140px);">

            <!-- 顶部栏：返回 + 职位信息 -->
            <div class="flex items-center justify-between mb-4">
                <button onclick="history.back()"
                    class="text-sm text-blue-600 hover:text-blue-800 flex items-center gap-1">
                    ← Back to jobs
                </button>
                <div class="text-right">
                    <h2 id="chat-job-title" class="text-lg font-semibold text-gray-900">Chat with HR</h2>
                    <p id="chat-job-sub" class="text-xs text-gray-500">Job · Company</p>
                </div>
            </div>

            <!-- 聊天卡片：注意这里的 flex-1 + flex-col + overflow-hidden -->
            <div class="flex-1 bg-white rounded-lg shadow flex flex-col overflow-hidden">

                <!-- 聊天内容区域：flex-1 + overflow-y-auto，让这里自己滚动 -->
                <div id="chat-thread" class="flex-1 px-4 py-4 space-y-3 overflow-y-auto">
                    <!-- 动态插入消息 -->
                </div>

                <!-- 输入区域：固定在卡片底部，不会被挤走 -->
                <form id="chat-form" class="border-t px-4 py-3 flex items-center gap-3 bg-gray-50">
                    <input id="chat-input" type="text" class="flex-1 border rounded-full px-4 py-2 text-sm
                        focus:outline-none focus:ring focus:border-blue-300" placeholder="Type your message here..."
                        autocomplete="off" />
                    <button type="submit" class="flex items-center justify-center px-4 py-2 rounded-full
                        bg-blue-600 text-white text-sm font-medium hover:bg-blue-700 transition">
                        Send
                    </button>
                </form>
            </div>

        </div>
    </main>


    <!-- 底部 -->
    <div id="footer"></div>

    <script>
        // 加载 header / footer（根据你实际路径）
        fetch('../header.html').then(r => r.text()).then(html => {
            document.getElementById('header').innerHTML = html;
        });
        fetch('../footer.html').then(r => r.text()).then(html => {
            document.getElementById('footer').innerHTML = html;
            if (window.loadRuntime) {
                window.loadRuntime();
            }
        });

        // ===== 从 URL 读参数：job_id, job_title, company, other_user_id =====
        const urlParams = new URLSearchParams(window.location.search);
        const jobId = urlParams.get('job_id');
        const jobTitle = urlParams.get('job_title') || 'Job Position';
        const company = urlParams.get('company') || 'Company';
        const otherUserId = urlParams.get('other_user_id');   // ⭐ 对方的 users_id

        document.getElementById('chat-job-title').textContent = 'Chat with HR';
        document.getElementById('chat-job-sub').textContent = `${jobTitle} · ${company}`;

        const chatThread = document.getElementById('chat-thread');
        const chatForm = document.getElementById('chat-form');
        const chatInput = document.getElementById('chat-input');

        if (!jobId || !otherUserId) {
            chatThread.innerHTML =
                '<div class="text-xs text-red-500 text-center mt-4">Missing job id or other_user_id in URL.</div>';
        }

        // ===== 渲染消息 =====
        function renderMessages(list) {
            chatThread.innerHTML = '';
            if (!list || list.length === 0) {
                chatThread.innerHTML =
                    '<div class="text-xs text-gray-400 text-center mt-4">No messages yet. Say hello!</div>';
                return;
            }

            list.forEach(msg => {
                const isMe = !!msg.from_me;
                const wrapper = document.createElement('div');
                wrapper.className = `flex ${isMe ? 'justify-end' : 'justify-start'}`;

                wrapper.innerHTML = `
          <div class="max-w-[70%]">
            <div class="inline-block px-3 py-2 rounded-lg text-sm leading-snug
                        ${isMe ? 'bg-blue-600 text-white' : 'bg-gray-100 text-gray-900'}">
              ${msg.content}
            </div>
            <div class="text-[10px] text-gray-400 mt-1 ${isMe ? 'text-right' : 'text-left'}">
              ${msg.sent_at || ''}
            </div>
          </div>
        `;
                chatThread.appendChild(wrapper);
            });

            chatThread.scrollTop = chatThread.scrollHeight;
        }

        // ===== 从后端拉消息 =====
        async function loadMessages() {
            if (!jobId || !otherUserId) return;
            try {
                const res = await fetch(
                    `get_messages.php?job_id=${encodeURIComponent(jobId)}&other_user_id=${encodeURIComponent(otherUserId)}`
                );
                const json = await res.json();
                if (!json.ok) {
                    console.error(json.error || 'Failed to load messages');
                    chatThread.innerHTML =
                        '<div class="text-xs text-gray-400 text-center mt-4">Failed to load messages.</div>';
                    return;
                }
                renderMessages(json.data || []);
            } catch (err) {
                console.error(err);
                chatThread.innerHTML =
                    '<div class="text-xs text-gray-400 text-center mt-4">Failed to load messages.</div>';
            }
        }

        // ===== 发送消息 =====
        chatForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const text = chatInput.value.trim();
            if (!text || !jobId || !otherUserId) return;

            try {
                const res = await fetch('send_message.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        job_id: jobId,
                        other_user_id: otherUserId,
                        content: text
                    })
                });
                const json = await res.json();
                if (!json.ok) {
                    console.error(json.error || 'Failed to send message');
                    return;
                }
                chatInput.value = '';
                await loadMessages();
            } catch (err) {
                console.error(err);
            }
        });

        // ===== 标记对话为已读 =====
        async function markConversationRead() {
            if (!jobId || !otherUserId) {
                console.log('no jobId or otherUserId, skip mark read');
                return;
            }

            try {
                const res = await fetch('mark_conversation_read.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        job_id: jobId,
                        other_user_id: otherUserId
                    })
                });
                const json = await res.json();
                console.log('markConversationRead result:', json);
            } catch (err) {
                console.error('markConversationRead error', err);
            }
        }


        // 初始加载 & 轮询
        loadMessages();
        markConversationRead();
        setInterval(loadMessages, 5000);
    </script>
    <script src="../runtime.js"></script>
</body>

</html>
