<!-- recruiter/recruiter_profile.html -->
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Recruiter Profile</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Tailwind CSS CDN -->
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">

    <!-- 如果你还有全站的自定义样式，可以继续引入 -->
    <!-- <link rel="stylesheet" href="../css/website.css"> -->
</head>

<body class="bg-gray-100 min-h-screen">

    <!-- 你可以改成单独的 recruiter header，这里先用通用 header.html -->
    <div id="header"></div>

    <!-- 顶部导航（Recruiter 版） -->
    <div class="flex space-x-3 ml-6 mt-3">
        <a href="dashboard-recruiter.html"
            class="px-4 py-2 rounded-lg font-semibold border border-blue-500 text-blue-600 hover:bg-blue-50 transition">
            My Jobs
        </a>
        <a href="notification.html"
            class="px-4 py-2 rounded-lg font-semibold border border-blue-500 bg-blue-50 text-blue-600 transition">
            Message Notifications
        </a>
        <a href="../message/announcements.html"
            class="px-4 py-2 rounded-lg font-semibold border border-blue-500 text-blue-600 hover:bg-blue-50 transition">
            Announcements
        </a>
        <a href="recruiter_profile.html"
            class="px-4 py-2 rounded-lg font-semibold border border-blue-500 text-blue-600 hover:bg-blue-50 transition">
            Personal Information
        </a>
    </div>

    <main class="max-w-3xl mx-auto px-4 py-10">
        <div class="bg-white shadow rounded-lg p-6">
            <h1 class="text-2xl font-semibold mb-6 text-gray-800">
                Recruiter Profile
            </h1>

            <!-- 提示信息区域 -->
            <div id="profileMessage" class="mb-4 hidden text-sm"></div>

            <form id="recruiterProfileForm" class="space-y-5">
                <!-- Full Name -->
                <div>
                    <label for="real_name" class="block text-gray-700 mb-1">
                        Full Name <span class="text-red-600">*</span>
                    </label>
                    <input type="text" id="real_name" name="real_name"
                        class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-400 focus:border-blue-400"
                        placeholder="Enter your full name" required>
                </div>

                <!-- Email -->
                <div>
                    <label for="email" class="block text-gray-700 mb-1">
                        Email <span class="text-red-600">*</span>
                    </label>
                    <input type="email" id="email" name="email"
                        class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-400 focus:border-blue-400"
                        placeholder="Enter your email" required>
                </div>

                <!-- Education Level -->
                <div>
                    <label for="pi_education" class="block text-gray-700 mb-1">
                        Highest Education Level <span class="text-red-600">*</span>
                    </label>
                    <select id="pi_education" name="education"
                        class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-400 focus:border-blue-400"
                        required>
                        <option value="">Any Education Level</option>
                        <option value="High School">High School / Secondary School</option>
                        <option value="Diploma">Diploma / Associate Degree</option>
                        <option value="Bachelor">Bachelor's Degree</option>
                        <option value="Master">Master's Degree</option>
                        <option value="PhD">PhD / Doctorate</option>
                        <option value="Postdoctoral">Postdoctoral</option>
                        <option value="Vocational">Vocational / Technical Training</option>
                        <option value="Other">Other</option>
                    </select>
                </div>

                <!-- Phone 1 -->
                <div>
                    <label for="phone1" class="block text-gray-700 mb-1">
                        Phone 1 <span class="text-red-600">*</span>
                    </label>
                    <input type="text" id="phone1" name="phone1"
                        class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-400 focus:border-blue-400"
                        placeholder="Primary phone number" required>
                    <p class="mt-1 text-xs text-gray-500">
                        This number will be used as your primary contact.
                    </p>
                </div>

                <!-- Phone 2 (optional) -->
                <div>
                    <label for="phone2" class="block text-gray-700 mb-1">
                        Phone 2 (Optional)
                    </label>
                    <input type="text" id="phone2" name="phone2"
                        class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-400 focus:border-blue-400"
                        placeholder="Secondary phone number (optional)">
                </div>

                <div class="pt-4">
                    <button type="submit"
                        class="inline-flex items-center px-5 py-2.5 bg-blue-600 text-white text-sm font-medium rounded-md hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-1 focus:ring-blue-500">
                        Save Profile
                    </button>
                </div>
            </form>
        </div>
    </main>

    <div id="footer"></div>
    <script>
        // Header/Footer loader
        fetch('../header.html').then(res => res.text()).then(data => {
            document.getElementById('header').innerHTML = data;
        });
        fetch('../footer.html').then(res => res.text()).then(data => {
            document.getElementById('footer').innerHTML = data;
            if (window.loadRuntime) {
                window.loadRuntime();
            }
        });
    </script>

    <script src="scripts/recruiter_profile.js"></script>
    <script src="../runtime.js"></script>
</body>

</html>
