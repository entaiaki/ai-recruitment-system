<!DOCTYPE html>
<html lang="en">
<!-- jobseeker/moment_edit.html -->

<head>
    <meta charset="UTF-8">
    <title>Edit Moments - Jobseeker</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/website.css">
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
</head>

<body class="bg-gray-50 min-h-screen flex flex-col">
    <!-- 顶部栏 -->
    <div id="header"></div>

    <!-- 导航 -->
    <div class="flex space-x-3 ml-6 mb-4">
        <a href="dashboard-jobseeker.html"
            class="px-4 py-2 rounded-lg font-semibold border border-blue-500 text-blue-600 hover:bg-blue-50 transition">
            Job browsing
        </a>
        <a href="resume-management.html"
            class="px-4 py-2 rounded-lg font-semibold border border-blue-500 text-blue-600 hover:bg-blue-50 transition">
            Resume Management
        </a>
        <a href="notification.html"
            class="px-4 py-2 rounded-lg font-semibold border border-blue-500 text-blue-600 hover:bg-blue-50 transition">
            Message Notifications
        </a>
        <!-- 当前页面：编辑 Moment -->
        <a href="moment_edit.html"
            class="px-4 py-2 rounded-lg font-semibold border border-blue-500 text-blue-600 hover:bg-blue-50 transition">
            Moments Editing
        </a>
        <!-- 共享页面：只看大家发的 Moment -->
        <a href="moment_shared.html"
            class="px-4 py-2 rounded-lg font-semibold border border-blue-500 text-blue-600 hover:bg-blue-50 transition">
            Moments Shared
        </a>
        <a href="../message/announcements.html"
            class="px-4 py-2 rounded-lg font-semibold border border-blue-500 text-blue-600 hover:bg-blue-50 transition">
            Announcements
        </a>
        <a href="personal-info.html"
            class="px-4 py-2 rounded-lg font-semibold border border-blue-500 text-blue-600 hover:bg-blue-50 transition">
            Personal Information
        </a>
    </div>

    <!-- 主体 -->
    <main class="flex-1">
        <div class="max-w-4xl mx-auto px-4 pb-8">
            <!-- 发布动态 -->
            <section class="mb-6 bg-white rounded-lg shadow p-4">
                <h2 class="text-lg font-semibold mb-3">Post a Moment</h2>
                <form id="moment-form" class="space-y-3">
                    <div>
                        <textarea id="moment-content" name="content" rows="3"
                            placeholder="Share your job hunting experience, thoughts, or anything..."
                            class="w-full border rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-200"
                            required></textarea>
                    </div>
                    <div>
                        <label class="block text-sm text-gray-700 mb-1">Images (optional)</label>
                        <input id="moment-images" name="images[]" type="file" accept="image/*" multiple
                            class="block w-full text-sm text-gray-700">
                        <p class="text-xs text-gray-400 mt-1">You can select multiple images.</p>
                    </div>
                    <div>
                        <button type="submit"
                            class="bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700 transition text-sm">
                            Post
                        </button>
                        <span id="moment-form-status" class="text-sm text-gray-500 ml-2"></span>
                    </div>
                </form>
            </section>

            <!-- 列表：依然显示所有人的 Moment，方便自己看效果 -->
            <section>
                <h2 class="text-lg font-semibold mb-3">My Moments History</h2>
                <div id="moments-list" class="space-y-4" data-mode="mine">
                    <!-- JS 渲染 -->
                </div>
                <div id="moments-empty" class="text-center text-gray-500 text-sm hidden">
                    No moments yet.
                </div>
            </section>
        </div>
    </main>

    <div id="footer"></div>
    <script>
        // Header/Footer loader
        fetch('../header.html').then(res => res.text()).then(data => {
            document.getElementById('header').innerHTML = data;
        });
        fetch('../footer.html').then(res => res.text()).then(data => {
            document.getElementById('footer').innerHTML = data;
            if (window.loadRuntime) {
                window.loadRuntime();
            }
        });
    </script>
    <script src="scripts/moments.js"></script>
    <script src="../runtime.js"></script>
</body>


</html>
